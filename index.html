<!DOCTYPE html>
<html lang="si" class="dark scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartoons LK — සිංහල කාටූන් එකතුව</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand:   { 400:'#fb923c',500:'#f97316',600:'#ea6c0a' },
            surface: { 900:'#0d0d0f',800:'#18181b',700:'#27272a',600:'#3f3f46',500:'#52525b' }
          },
          fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'], sinhala: ['"Noto Sans Sinhala"','sans-serif'] },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dark font-sans text-zinc-100 min-h-screen">

<nav class="sticky top-0 z-50 border-b border-zinc-800/70 backdrop-blur-xl bg-surface-900/80">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-14">
    <a href="index.html" class="flex items-center gap-2 group">
      <span class="text-xl">📺</span> <span class="font-bold text-base"><span class="text-brand-400">Cartoons</span>LK</span>
    </a>
    <button id="menu-toggle" class="p-2 rounded-lg text-zinc-400 focus:outline-none cursor-pointer">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>
</nav>

<!-- Sidebar logic is handled by common.js -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] opacity-0 pointer-events-none transition-opacity duration-300"></div>
<aside id="sidebar" class="fixed top-0 right-0 h-full w-[300px] bg-surface-900 border-l border-zinc-800/50 z-[70] translate-x-full transition-transform duration-300 ease-out flex flex-col shadow-2xl">
  <!-- Search Header -->
  <div class="p-6 border-b border-zinc-800/60">
    <div class="relative group">
      <input type="text" placeholder="Search..." class="w-full bg-zinc-900 border border-zinc-700/50 rounded-full py-2.5 pl-5 pr-10 text-xs focus:outline-none focus:border-brand-500/60 transition-all duration-300" />
      <span class="absolute right-4 top-1/2 -translate-y-1/2 text-brand-500 text-sm opacity-70 group-hover:opacity-100 cursor-pointer">🔍</span>
    </div>
  </div>

  <div class="flex-grow overflow-y-auto">
    <div class="flex flex-col">
      <a href="index.html" class="flex items-center gap-4 px-6 py-4 text-sm font-semibold text-zinc-300 hover:bg-zinc-800/50 hover:text-brand-400 transition-all border-b border-zinc-800/50">
        <span class="text-lg">🏠</span> Home
      </a>
      <a href="cartoons.html" class="flex items-center gap-4 px-6 py-4 text-sm font-semibold text-zinc-300 hover:bg-zinc-800/50 hover:text-brand-400 transition-all border-b border-zinc-800/50">
        <span class="text-lg">📺</span> Cartoons
      </a>
      <a href="movies.html" class="flex items-center gap-4 px-6 py-4 text-sm font-semibold text-zinc-300 hover:bg-zinc-800/50 hover:text-brand-400 transition-all border-b border-zinc-800/50">
        <span class="text-lg">🎬</span> Movies
      </a>
      <a href="series-details.html" class="flex items-center gap-4 px-6 py-4 text-sm font-semibold text-zinc-300 hover:bg-zinc-800/50 hover:text-brand-400 transition-all border-b border-zinc-800/50">
        <span class="text-lg">🎞️</span> TV Series
      </a>
      <a href="contact.html" class="flex items-center gap-4 px-6 py-4 text-sm font-semibold text-zinc-300 hover:bg-zinc-800/50 hover:text-brand-400 transition-all border-b border-zinc-800/50">
        <span class="text-lg">📧</span> Contact Us
      </a>
      <a href="terms.html" class="flex items-center gap-4 px-6 py-4 text-sm font-semibold text-zinc-300 hover:bg-zinc-800/50 hover:text-brand-400 transition-all border-b border-zinc-800/50">
        <span class="text-lg">⚖️</span> Privacy Policy
      </a>
      <div id="nav-auth-links" class="flex flex-col"></div>
    </div>
  </div>

  <!-- Close button footer for mobile friendliness -->
  <div class="p-6 border-t border-zinc-800/60 text-center">
    <button id="menu-close" class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest hover:text-zinc-400 transition-colors uppercase">Close Menu</button>
  </div>
</aside>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-10">
    
  <!-- 1. Hero Section (9Anime Style) -->
  <div class="grid lg:grid-cols-12 gap-6 items-start">
    <div class="lg:col-span-9">
      <div class="relative group rounded-[2rem] overflow-hidden border border-zinc-800/80 shadow-2xl h-[400px]">
        <!-- Background Image -->
        <div id="hero-img-container" class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-105" style="background-image: url('https://images6.alphacoders.com/132/1324701.png');"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-brand-600/80 via-black/40 to-transparent"></div>
        
        <!-- Hero Content -->
        <div class="absolute bottom-0 left-0 p-8 sm:p-12 w-full">
           <h1 id="hero-title" class="text-3xl sm:text-4xl font-black text-white mb-4 line-clamp-1 glow-text uppercase tracking-tighter">Featured Cartoon</h1>
           <div class="flex flex-wrap items-center gap-3 mb-6">
              <span class="badge bg-white text-black">HD</span>
              <span class="badge bg-brand-500 text-white">සිංහල</span>
              <span class="text-xs font-bold text-zinc-100/80 uppercase tracking-widest ml-1 opacity-70">• 20 min per ep</span>
           </div>
           <p id="hero-desc" class="text-sm text-zinc-200/90 max-w-xl line-clamp-2 leading-relaxed mb-8 opacity-90">Experience the best classic cartoons in high quality Sinhala dubbing. Start your journey today!</p>
           <a id="hero-link" href="#" class="inline-flex items-center gap-3 bg-white text-black px-8 py-3.5 rounded-full font-black text-sm uppercase tracking-widest hover:bg-brand-400 hover:text-white transition-all shadow-xl active:scale-95 group/hero">
             <span>▶</span> Watch Now
           </a>
        </div>

        <!-- Slider Navigation -->
        <div class="absolute top-1/2 -translate-y-1/2 left-4 right-4 flex justify-between opacity-0 group-hover:opacity-100 transition-opacity">
           <button class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white hover:bg-brand-500 transition-colors">❮</button>
           <button class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white hover:bg-brand-500 transition-colors">❯</button>
        </div>
      </div>
    </div>

    <!-- Quick Filter (Right Sidebar) -->
    <aside class="lg:col-span-3 space-y-6 flex flex-col h-full justify-between">
      <div class="bg-surface-800/80 border border-zinc-700/40 rounded-[2rem] p-6 glass-card shadow-2xl h-full">
         <h3 class="text-xs font-black text-zinc-400 uppercase tracking-widest mb-6 border-l-4 border-brand-500 pl-3">Quick Filter</h3>
         <div class="space-y-4">
            <select class="input-field bg-zinc-900 border-zinc-800 text-[11px] uppercase font-bold tracking-widest h-12">
               <option>Genre: All</option>
               <option>Action</option><option>Adventure</option>
            </select>
            <select class="input-field bg-zinc-900 border-zinc-800 text-[11px] uppercase font-bold tracking-widest h-12">
               <option>Season: All</option>
            </select>
            <select class="input-field bg-zinc-900 border-zinc-800 text-[11px] uppercase font-bold tracking-widest h-12">
               <option>Status: All</option>
            </select>
            <input type="text" placeholder="Search..." class="input-field bg-zinc-900 border-zinc-800 text-[11px] h-12 font-bold tracking-widest" />
            <button class="w-full bg-brand-500 text-white py-3.5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-brand-500/20 active:scale-95 transition-all mt-4">
               Filter Series
            </button>
         </div>
      </div>
    </aside>
  </div>

  <!-- 2. Content Sections -->
  <div class="grid lg:grid-cols-12 gap-8 mt-12">
    <div class="lg:col-span-9 space-y-12">
      
      <!-- Trending Now -->
      <section>
        <div class="flex items-center justify-between mb-8">
           <h2 class="text-2xl font-black text-white italic uppercase tracking-tighter flex items-center gap-2">
             <span class="w-1 h-6 bg-brand-500"></span> Trending Now
           </h2>
           <a href="#" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest hover:text-brand-500 transition-colors">View All »</a>
        </div>
        <div id="series-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
           <!-- Grid cards here -->
        </div>
      </section>

    </div>

    <!-- Right Small Sidebar -->
    <aside class="lg:col-span-3 space-y-10 text-right md:text-left">
       <div class="bg-surface-800/40 rounded-[2rem] p-6 border border-zinc-800/60">
          <h3 class="text-sm font-black text-white italic uppercase tracking-widest mb-6">Top 10 Cartoons</h3>
          <div class="flex bg-zinc-900/50 rounded-xl p-1 mb-6">
             <button class="flex-1 py-1.5 text-[9px] font-black uppercase tracking-widest bg-brand-500 text-white rounded-lg">Today</button>
             <button class="flex-1 py-1.5 text-[9px] font-black uppercase tracking-widest text-zinc-500 hover:text-white">Week</button>
             <button class="flex-1 py-1.5 text-[9px] font-black uppercase tracking-widest text-zinc-500 hover:text-white">Month</button>
          </div>
          <div id="top-list" class="space-y-4">
             <!-- Top cards loaded here -->
          </div>
       </div>
    </aside>
  </div>

</main>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/common.js"></script>
<script src="js/app.js"></script>
</body>
</html>
